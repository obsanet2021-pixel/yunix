<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUNIX AI Functions - Beta Preview</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .endpoint {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .endpoint h3 {
            margin-top: 0;
            color: #ffd700;
        }
        .test-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-weight: 500;
            color: #ffd700;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        button {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }
        .response {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 500;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 YUNIX AI Functions - Beta Preview</h1>
        
        <div class="status success">
            ✅ Server running on http://localhost:54321
        </div>

        <div class="endpoint">
            <h3>📝 Daily Check-in AI</h3>
            <p>Test the daily check-in AI coaching functionality</p>
            <form class="test-form" id="dailyCheckinForm">
                <div class="form-group">
                    <label for="mood">Mood:</label>
                    <select id="mood" name="mood">
                        <option value="">Select mood...</option>
                        <option value="calm">😌 Calm</option>
                        <option value="confident">💪 Confident</option>
                        <option value="excited">🔥 Excited</option>
                        <option value="anxious">😰 Anxious</option>
                        <option value="frustrated">😤 Frustrated</option>
                        <option value="neutral">😐 Neutral</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="confidence">Confidence (1-10):</label>
                    <input type="number" id="confidence" name="confidence_level" min="1" max="10" value="5">
                </div>
                <div class="form-group">
                    <label for="stress">Stress (1-10):</label>
                    <input type="number" id="stress" name="stress_level" min="1" max="10" value="3">
                </div>
                <div class="form-group">
                    <label for="sleep">Sleep Quality:</label>
                    <select id="sleep" name="sleep_quality">
                        <option value="">Select sleep quality...</option>
                        <option value="excellent">😴 Excellent</option>
                        <option value="good">🙂 Good</option>
                        <option value="fair">😕 Fair</option>
                        <option value="poor">😵 Poor</option>
                    </select>
                </div>
                <button type="submit">Get AI Coaching</button>
            </form>
            <div id="dailyCheckinResponse" class="response" style="display: none;"></div>
        </div>

        <div class="endpoint">
            <h3>💬 AI Support Chat</h3>
            <p>Test the AI support assistant functionality</p>
            <form class="test-form" id="supportChatForm">
                <div class="form-group">
                    <label for="supportMessage">Your Message:</label>
                    <textarea id="supportMessage" name="message" rows="3" placeholder="Ask about billing, security, or general questions..."></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
            <div id="supportChatResponse" class="response" style="display: none;"></div>
        </div>

        <div class="endpoint">
            <h3>🤖 General AI Chat</h3>
            <p>Test the general AI chat functionality</p>
            <form class="test-form" id="generalChatForm">
                <div class="form-group">
                    <label for="generalMessage">Your Message:</label>
                    <textarea id="generalMessage" name="message" rows="3" placeholder="Ask anything..."></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
            <div id="generalChatResponse" class="response" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:54321';

        async function testEndpoint(endpoint, formData, responseDiv) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                if (response.ok) {
                    responseDiv.style.display = 'block';
                    responseDiv.style.background = 'rgba(34, 197, 94, 0.2)';
                    responseDiv.style.borderColor = 'rgba(34, 197, 94, 0.5)';
                    responseDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    responseDiv.style.display = 'block';
                    responseDiv.style.background = 'rgba(239, 68, 68, 0.2)';
                    responseDiv.style.borderColor = 'rgba(239, 68, 68, 0.5)';
                    responseDiv.textContent = `Error: ${data.error || 'Unknown error'}`;
                }
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.style.background = 'rgba(239, 68, 68, 0.2)';
                responseDiv.style.borderColor = 'rgba(239, 68, 68, 0.5)';
                responseDiv.textContent = `Network Error: ${error.message}`;
            }
        }

        // Daily Check-in Form
        document.getElementById('dailyCheckinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Convert to numbers
            data.confidence_level = parseInt(data.confidence_level);
            data.stress_level = parseInt(data.stress_level);
            
            await testEndpoint('/daily-checkin-ai', data, document.getElementById('dailyCheckinResponse'));
        });

        // Support Chat Form
        document.getElementById('supportChatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const message = formData.get('message');
            
            await testEndpoint('/ai-support-chat', {
                messages: [{ role: 'user', content: message }]
            }, document.getElementById('supportChatResponse'));
        });

        // General Chat Form
        document.getElementById('generalChatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const message = formData.get('message');
            
            await testEndpoint('/chat', {
                messages: [{ role: 'user', content: message }]
            }, document.getElementById('generalChatResponse'));
        });
    </script>
</body>
</html>
